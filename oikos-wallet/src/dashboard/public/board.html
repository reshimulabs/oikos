<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oikos Board</title>
<style>
  :root {
    --bg: #f5f2ec;
    --bg2: #edeae4;
    --card: #faf8f4;
    --card-hover: #f0ede7;
    --border: #c8c0b0;
    --text: #1a1a1a;
    --muted: #6b6358;
    --dim: #9a9184;
    --green: #2d8a4e;
    --red: #c0392b;
    --yellow: #d4a017;
    --blue: #2874a6;
    --purple: #6c3483;
    --orange: #d35400;
    --gold: #b8860b;
    --cyan: #148f77;
    --brand-yellow: #ebb743;
    --brand-black: #1a1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'JetBrains Mono', 'IBM Plex Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }

  /* ═══ TOPBAR ═══ */
  .topbar {
    background: var(--bg2);
    border-bottom: 2px solid var(--brand-black);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    flex-shrink: 0;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    height: 100%;
  }
  .topbar-title {
    padding: 0 1.5rem;
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.15rem 0.5rem;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: 1px solid currentColor;
  }
  .status-live { color: var(--green); }
  .status-offline { color: var(--red); }
  .status-dot { width: 6px; height: 6px; display: inline-block; }
  .status-dot.on { background: var(--green); animation: pulse 2s ease infinite; }
  .status-dot.off { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .topbar-right { display: flex; align-items: center; height: 100%; }
  .topbar-meta {
    padding: 0 1rem;
    font-size: 10px;
    color: var(--dim);
  }
  .logo-block {
    background: var(--brand-yellow);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 1.5rem;
    border-left: 2px solid var(--brand-black);
    overflow: hidden;
  }
  .logo-block svg {
    height: 48px;
    width: auto;
    color: #1a1a1a; /* logo stays black regardless of theme */
  }

  /* ═══ SCROLLABLE CONTENT ═══ */
  .content {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem;
    width: 100%;
    flex: 1;
  }

  /* ═══ KPI STRIP ═══ */
  .kpi-strip {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .kpi {
    background: var(--card);
    border: 2px solid var(--brand-black);
    padding: 0.75rem 0.85rem;
  }
  .kpi-label {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .kpi-value {
    font-size: 1.5rem;
    font-weight: 800;
    margin-top: 0.1rem;
  }
  .green { color: var(--green); }
  .blue { color: var(--blue); }
  .purple { color: var(--purple); }
  .gold { color: var(--gold); }
  .red { color: var(--red); }

  /* ═══ SEARCH ═══ */
  .search-box {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }
  .search-icon { font-size: 14px; color: var(--dim); flex-shrink: 0; }
  .search-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
  }
  .search-input::placeholder { color: var(--dim); }
  .search-clear {
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: var(--dim); padding: 0 4px; display: none;
  }
  .search-clear:hover { color: var(--text); }

  /* ═══ SECTION ═══ */
  .section {
    margin-top: 1.25rem;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-title {
    font-size: 11px; font-weight: 800; color: var(--text);
    text-transform: uppercase; letter-spacing: 0.12em; white-space: nowrap;
  }
  .section-line { flex: 1; height: 2px; background: var(--brand-black); }
  .section-count {
    font-size: 10px; font-weight: 700; padding: 0.1rem 0.4rem;
    border: 1px solid var(--brand-black); background: var(--brand-yellow); color: var(--brand-black);
  }

  /* ═══ TAG CLOUD ═══ */
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; padding: 0.6rem 0; }
  .tag-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 0.2rem 0.6rem; background: var(--card);
    border: 1px solid var(--brand-black); font-size: 11px; font-weight: 600;
    color: var(--text); cursor: pointer; transition: background 0.15s;
    text-transform: lowercase;
  }
  .tag-pill:hover { background: var(--card-hover); }
  .tag-pill.active { background: var(--brand-yellow); color: var(--brand-black); }
  .tag-count { font-size: 9px; color: var(--dim); font-weight: 700; }
  .tag-pill.active .tag-count { color: var(--brand-black); }

  /* ═══ CARDS ═══ */
  .card {
    background: var(--card);
    border: 2px solid var(--brand-black);
    padding: 0.85rem 1rem;
  }

  /* ═══ ANNOUNCEMENTS ═══ */
  .ann-item { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .ann-item:last-child { border-bottom: none; }
  .ann-top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.5rem; margin-bottom: 0.25rem;
  }
  .ann-title-row { display: flex; align-items: center; gap: 0.5rem; min-width: 0; flex: 1; }
  .ann-title { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ann-id {
    font-size: 9px; color: var(--dim); cursor: pointer;
    padding: 0.05rem 0.3rem; border: 1px solid var(--border);
    background: var(--bg); white-space: nowrap; position: relative; flex-shrink: 0;
  }
  .ann-id:hover { border-color: var(--brand-black); }
  .ann-id .copied {
    position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
    background: var(--brand-black); color: var(--brand-yellow);
    font-size: 9px; padding: 1px 6px; white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.2s;
  }
  .ann-id .copied.show { opacity: 1; }
  .ann-cat {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    padding: 0.05rem 0.35rem; border: 1px solid currentColor; flex-shrink: 0;
  }
  .cat-seller { color: var(--blue); }
  .cat-buyer { color: var(--purple); }
  .cat-auction { color: var(--gold); }
  .ann-desc { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 0.3rem; }
  .ann-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 0.3rem; }
  .ann-tag {
    font-size: 9px; padding: 0.05rem 0.3rem; background: var(--bg);
    border: 1px solid var(--border); color: var(--muted); cursor: pointer;
  }
  .ann-tag:hover { border-color: var(--brand-black); }
  .ann-bottom {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 0.3rem; font-size: 11px;
  }
  .ann-agent { color: var(--muted); }
  .ann-agent strong { color: var(--text); }
  .ann-price { font-weight: 700; color: var(--green); }
  .ann-time { color: var(--dim); font-size: 10px; }

  .empty { color: var(--dim); font-size: 12px; padding: 0.75rem 0; text-align: center; }

  /* ═══ STICKY FOOTER ═══ */
  .sticky-footer {
    flex-shrink: 0;
    border-top: 2px solid var(--brand-black);
    background: var(--bg2);
    padding: 0.6rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; font-size: 10px; color: var(--dim);
  }
  .footer-left { display: flex; align-items: center; gap: 0.5rem; }
  .footer-left svg { height: 20px; width: auto; color: var(--dim); }
  .footer-cta { font-size: 11px; color: var(--muted); }
  .footer-cta a { color: var(--blue); text-decoration: none; font-weight: 700; }
  .footer-cta a:hover { text-decoration: underline; }

  /* ═══ DARK MODE ═══ */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c20; --bg2: #242428; --card: #2a2a2f; --card-hover: #323237;
      --border: #48484e; --text: #e4e0d8; --muted: #a09a90; --dim: #6e6a62;
      --green: #4ade80; --red: #f87171; --yellow: #fbbf24; --blue: #60a5fa;
      --purple: #a78bfa; --orange: #fb923c; --gold: #fbbf24; --cyan: #2dd4bf;
      --brand-black: #6a6a70;
    }
    ::-webkit-scrollbar-thumb { background: #48484e; }
  }

  @media (max-width: 900px) {
    .kpi-strip { grid-template-columns: 1fr; }
    .main { padding: 0.75rem 1rem; }
    .topbar-title { padding: 0 0.75rem; font-size: 12px; }
    .sticky-footer { flex-direction: column; text-align: center; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>

<script>
const REFRESH_MS = 3000;
let activeTag = null;
let searchQuery = '';
let lastData = null;

const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  searchClear.style.display = searchQuery ? 'block' : 'none';
  if (lastData) renderAnnouncements(lastData.announcements || []);
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.style.display = 'none';
  if (lastData) renderAnnouncements(lastData.announcements || []);
});

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 5) return 'just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function copyId(el, fullId) {
  navigator.clipboard.writeText(fullId).then(() => {
    const tip = el.querySelector('.copied');
    tip.classList.add('show');
    setTimeout(() => tip.classList.remove('show'), 1200);
  });
}

function setActiveTag(tag) {
  activeTag = activeTag === tag ? null : tag;
  if (lastData) {
    renderTags(lastData.tags || []);
    renderAnnouncements(lastData.announcements || []);
  }
}

function filterAnn(a) {
  if (activeTag) {
    const tags = (a.tags || []).map(t => t.toLowerCase());
    if (!tags.includes(activeTag.toLowerCase())) return false;
  }
  if (searchQuery) {
    const hay = [a.title, a.description, a.agentName, ...(a.tags || [])].join(' ').toLowerCase();
    if (!hay.includes(searchQuery)) return false;
  }
  return true;
}

function renderTags(tags) {
  const section = document.getElementById('tags-section');
  const cloud = document.getElementById('tag-cloud');
  document.getElementById('tags-count').textContent = tags.length;

  if (!tags.length) {
    section.style.display = 'none';
    cloud.innerHTML = '';
    return;
  }

  section.style.display = 'flex';
  cloud.innerHTML = tags.map(t => {
    const isActive = activeTag && activeTag.toLowerCase() === t.tag.toLowerCase();
    return '<span class="tag-pill' + (isActive ? ' active' : '') + '" onclick="setActiveTag(\'' + esc(t.tag) + '\')">' +
      esc(t.tag) + '<span class="tag-count">' + t.count + '</span></span>';
  }).join('');
}

function renderAnnouncements(anns) {
  const list = document.getElementById('ann-list');
  const filtered = anns.filter(filterAnn);
  document.getElementById('ann-count').textContent = filtered.length;

  if (!filtered.length) {
    const msg = (activeTag || searchQuery)
      ? 'No announcements match your filter.'
      : 'No announcements on the board yet.';
    list.innerHTML = '<div class="empty">' + msg + '</div>';
    return;
  }

  const sorted = [...filtered].sort((a, b) => b.timestamp - a.timestamp);

  list.innerHTML = sorted.map(a => {
    const cat = (a.category === 'seller' || a.category === 'service' || a.category === 'offer') ? 'seller' :
                a.category === 'auction' ? 'auction' : 'buyer';
    const catLabel = cat.toUpperCase();
    const catCls = 'cat-' + cat;
    const price = a.priceRange && a.priceRange.min != null && a.priceRange.max != null
      ? a.priceRange.min + '-' + a.priceRange.max + ' ' + (a.priceRange.symbol || '')
      : '';
    const tags = (a.tags || []).map(t =>
      '<span class="ann-tag" onclick="setActiveTag(\'' + esc(t) + '\')">' + esc(t) + '</span>'
    ).join('');

    return '<div class="ann-item">' +
      '<div class="ann-top">' +
        '<div class="ann-title-row">' +
          '<div class="ann-title">' + esc(a.title) + '</div>' +
          '<span class="ann-id" onclick="copyId(this, \'' + a.id + '\')">' + a.id.slice(0, 8) + '... <span class="copied">Copied!</span></span>' +
        '</div>' +
        '<span class="ann-cat ' + catCls + '">' + catLabel + '</span>' +
      '</div>' +
      (a.description ? '<div class="ann-desc">' + esc(a.description) + '</div>' : '') +
      (tags ? '<div class="ann-tags">' + tags + '</div>' : '') +
      '<div class="ann-bottom">' +
        '<span class="ann-agent">by <strong>' + esc(a.agentName) + '</strong> · rep ' + Math.round(a.reputation * 100) + '%</span>' +
        (price ? '<span class="ann-price">' + price + '</span>' : '') +
        '<span class="ann-time">' + timeAgo(a.timestamp) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function refresh() {
  try {
    const res = await fetch('/api/board');
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    lastData = data;

    const status = document.getElementById('status');
    if (data.enabled) {
      status.className = 'status-pill status-live';
      status.innerHTML = '<span class="status-dot on"></span><span>live</span>';
    } else {
      status.className = 'status-pill status-offline';
      status.innerHTML = '<span class="status-dot off"></span><span>disabled</span>';
    }

    document.getElementById('id-peers').textContent = (data.boardPeers || []).length;
    document.getElementById('id-listings').textContent = (data.announcements || []).length;

    renderTags(data.tags || []);
    renderAnnouncements(data.announcements || []);
  } catch {
    const status = document.getElementById('status');
    status.className = 'status-pill status-offline';
    status.innerHTML = '<span class="status-dot off"></span><span>offline</span>';
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
